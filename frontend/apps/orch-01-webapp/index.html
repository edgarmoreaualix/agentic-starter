<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>orch-01-webapp</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <p class="eyebrow">Loop 009</p>
        <h1 id="project-title">Loading project...</h1>
        <div id="color-chips" class="chips" aria-label="Project colors"></div>
      </header>

      <section class="panel" aria-labelledby="status-heading">
        <h2 id="status-heading">Backend status</h2>
        <p id="status-text">Loading status...</p>
        <ul id="feature-list"></ul>
      </section>

      <section class="panel" aria-labelledby="specialist-heading">
        <h2 id="specialist-heading">Specialist message</h2>
        <pre id="specialist-message">Loading specialist message...</pre>
      </section>

      <p id="error" class="error" hidden></p>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>

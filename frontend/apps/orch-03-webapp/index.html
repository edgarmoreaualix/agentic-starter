<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>orch-03-webapp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Manrope:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel">
        <p class="eyebrow">orch-03 web app</p>
        <h1 id="title">Loading project...</h1>
        <div id="chips" class="chips" aria-label="Project color chips"></div>
      </section>

      <section class="panel">
        <h2>Backend Status</h2>
        <p id="status" class="status">Loading status...</p>
        <h3>Features</h3>
        <ul id="features" class="feature-list"></ul>
      </section>

      <section class="panel specialist-panel">
        <h2>Specialist Message</h2>
        <pre id="specialist" class="specialist-text">Loading specialist message...</pre>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
